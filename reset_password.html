<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password - Honorian AskBot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #f5f5f5;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      background: #fff;
      padding: 2rem 2.5rem;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(128,0,0,0.08);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h2 {
      color: #800000;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #333;
      font-weight: bold;
      text-align: left;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 1.2rem;
      font-size: 1rem;
    }
    button {
      background: #800000;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 12px 0;
      width: 100%;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #A52A2A;
    }
    .message {
      margin-top: 1rem;
      font-size: 1rem;
      min-height: 1.5em;
    }
    .success { color: #155724; background: #d4edda; border-radius: 5px; padding: 0.5em; }
    .error { color: #721c24; background: #f8d7da; border-radius: 5px; padding: 0.5em; }
    a { color: #800000; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Reset Password</h2>
    <form id="reset-form">
      <label for="password">New Password:</label>
      <input type="password" id="password" name="password" required minlength="8" placeholder="Enter new password">
      <label for="confirm">Confirm New Password:</label>
      <input type="password" id="confirm" name="confirm" required minlength="8" placeholder="Confirm new password">
      <button type="submit">Reset Password</button>
    </form>
    <div class="message" id="message"></div>
    <p style="margin-top:1.5em;">
      <a href="index.html">Back to Login</a>
    </p>
  </div>
  <script>
    // Helper: SHA-256 hashing
    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Get query params
    function getQueryParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyT5rAzRKuZNhu0_GIjnx3AJs2Mpy6NAXlrP41dU8ZSWoRDO0N1dw3tijZoHDnysGDR/exec';
    const email = getQueryParam('email');
    const token = getQueryParam('token');
    const messageBox = document.getElementById('message');

    if (!email || !token) {
      messageBox.textContent = "Invalid or missing reset link. Please check your email or request a new reset link.";
      messageBox.className = "message error";
      document.getElementById('reset-form').style.display = 'none';
    }

    document.getElementById('reset-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      messageBox.textContent = '';
      messageBox.className = 'message';

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (password.length < 8) {
        messageBox.textContent = "Password must be at least 8 characters.";
        messageBox.classList.add('error');
        return;
      }
      if (password !== confirm) {
        messageBox.textContent = "Passwords do not match.";
        messageBox.classList.add('error');
        return;
      }

      messageBox.textContent = "Resetting password...";
      try {
        const hashedPassword = await sha256(password);
        const formData = new FormData();
        formData.append('action', 'resetPassword');
        formData.append('email', email);
        formData.append('token', token);
        formData.append('password', hashedPassword);

        const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
        const result = await response.json();
        if (result.success) {
          messageBox.textContent = result.message + " You may now log in with your new password.";
          messageBox.classList.add('success');
          document.getElementById('reset-form').reset();
        } else {
          messageBox.textContent = result.message;
          messageBox.classList.add('error');
        }
      } catch (err) {
        messageBox.textContent = "An error occurred. Please try again later.";
        messageBox.classList.add('error');
      }
    });
  </script>
</body>
</html>
