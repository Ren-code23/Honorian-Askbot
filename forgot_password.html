<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password - Honorian AskBot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #f5f5f5;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      background: #fff;
      padding: 2rem 2.5rem;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(128,0,0,0.08);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h2 {
      color: #800000;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #333;
      font-weight: bold;
      text-align: left;
    }
    input[type="email"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 1.2rem;
      font-size: 1rem;
    }
    button {
      background: #800000;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 12px 0;
      width: 100%;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #A52A2A;
    }
    .message {
      margin-top: 1rem;
      font-size: 1rem;
      min-height: 1.5em;
    }
    .success { color: #155724; background: #d4edda; border-radius: 5px; padding: 0.5em; }
    .error { color: #721c24; background: #f8d7da; border-radius: 5px; padding: 0.5em; }
    a { color: #800000; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Forgot Password</h2>
    <form id="forgot-form">
      <label for="email">Enter your registered email address:</label>
      <input type="email" id="email" name="email" required autocomplete="email">
      <button type="submit">Send Reset Link</button>
    </form>
    <div class="message" id="message"></div>
    <p style="margin-top:1.5em;">
      <a href="index.html">Back to Login</a>
    </p>
  </div>
  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyT5rAzRKuZNhu0_GIjnx3AJs2Mpy6NAXlrP41dU8ZSWoRDO0N1dw3tijZoHDnysGDR/exec';
    document.getElementById('forgot-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const messageBox = document.getElementById('message');
      messageBox.textContent = '';
      messageBox.className = 'message';
      if (!/\S+@\S+\.\S+/.test(email)) {
        messageBox.textContent = 'Please enter a valid email address.';
        messageBox.classList.add('error');
        return;
      }
      messageBox.textContent = 'Sending reset link...';
      try {
        const formData = new FormData();
        formData.append('action', 'forgotPassword');
        formData.append('email', email);
        const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
        const result = await response.json();
        if (result.success) {
          messageBox.textContent = result.message;
          messageBox.classList.add('success');
        } else {
          messageBox.textContent = result.message;
          messageBox.classList.add('error');
        }
      } catch (err) {
        messageBox.textContent = 'An error occurred. Please try again later.';
        messageBox.classList.add('error');
      }
    });
  </script>
</body>
</html>
